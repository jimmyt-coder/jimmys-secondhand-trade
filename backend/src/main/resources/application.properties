spring.application.name=secondhand-trade
# Server
server.port=8080
# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/secondhand_trade?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# MyBatis-Plus
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.global-config.db-config.id-type=auto
# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
# Storage mode
app.s3.enabled=
app.upload.path=./uploads
# AWS S3 config
app.s3.access-key=
app.s3.secret-key=
app.s3.region=
app.s3.bucket=
app.s3.base-url=
# JWT
app.jwt.secret=
app.jwt.expiration=604800000
# Jackson
spring.jackson.time-zone=Asia/Shanghai
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
